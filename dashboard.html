<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Marketingowe Imperium</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #e8287a;
      --purple: #8b2fc9;
      --dark:   #06060f;
      --glass:  rgba(13, 13, 26, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(13, 13, 26, 0.8);
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(232, 40, 122, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 47, 201, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .nav {
      background: rgba(13, 13, 26, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .12em;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(232, 40, 122, 0.3));
    }

    .btn {
      padding: .6rem 1.4rem;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
      letter-spacing: .04em;
    }

    .btn-primary {
      background: linear-gradient(130deg, var(--pink), var(--purple));
      color: #fff;
      box-shadow: 0 4px 20px rgba(232, 40, 122, 0.3);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn-small {
      padding: .4rem 1rem;
      font-size: .75rem;
    }

    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: .1em;
      margin-bottom: .8rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .12em;
      margin-bottom: 1.5rem;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.8rem;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: all .3s;
    }

    .card:hover {
      border-color: rgba(232, 40, 122, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
    }

    .card-info {
      padding: 1.2rem;
    }

    .card-title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: .8rem;
    }

    .upload-placeholder {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 2px dashed rgba(232, 40, 122, 0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1rem;
      cursor: pointer;
      transition: all .3s;
      min-height: 340px;
    }

    .upload-placeholder:hover {
      background: rgba(232, 40, 122, 0.08);
      border-color: var(--pink);
      box-shadow: 0 0 30px rgba(232, 40, 122, 0.2);
    }

    .upload-icon {
      font-size: 3.5rem;
      opacity: .4;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .upload-text {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: rgba(255,255,255,.5);
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,.5);
    }

    .loading.active { display: block; }

    .spinner {
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--pink);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="logo">Marketingowe Imperium</div>
    <div>
      <span id="userName" style="margin-right: 1rem;"></span>
      <button class="btn btn-ghost btn-small" onclick="logout()">Wyloguj</button>
    </div>
  </nav>

  <section class="hero">
    <h1>Witaj, <span id="heroName"></span>!</h1>
    <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-top: 2rem;">
      <div style="text-align: center;">
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem;">Twoje Imperium</div>
        <div id="progress-percentage" style="font-family: 'Bebas Neue', sans-serif; font-size: 3rem; background: linear-gradient(130deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">0%</div>
      </div>
      <div style="position: relative; height: 150px; width: 100px;">
        <!-- Tower segments (bottom to top) -->
        <div id="tower-base" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 30px; background: linear-gradient(135deg, rgba(232,40,122,0.6), rgba(139,47,201,0.6)); border-radius: 4px 4px 0 0; opacity: 0.1; transition: opacity 0.5s ease;"></div>
        <div id="tower-mid" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 30px; background: linear-gradient(135deg, rgba(232,40,122,0.7), rgba(139,47,201,0.7)); border-radius: 4px 4px 0 0; opacity: 0.1; transition: opacity 0.5s ease;"></div>
        <div id="tower-upper" style="position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 60px; height: 30px; background: linear-gradient(135deg, rgba(232,40,122,0.8), rgba(139,47,201,0.8)); border-radius: 4px 4px 0 0; opacity: 0.1; transition: opacity 0.5s ease;"></div>
        <div id="tower-neck" style="position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 50px; height: 30px; background: linear-gradient(135deg, rgba(232,40,122,0.9), rgba(139,47,201,0.9)); border-radius: 4px 4px 0 0; opacity: 0.1; transition: opacity 0.5s ease;"></div>
        <div id="tower-spire" style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 40px; height: 30px; background: linear-gradient(135deg, rgb(232,40,122), rgb(139,47,201)); border-radius: 20px 20px 0 0; opacity: 0.1; transition: opacity 0.5s ease;"></div>
      </div>
    </div>
  </section>

  <main class="container">
    <h2 class="section-title">Twoje eBooki</h2>
    <div class="loading active" id="loadingEbooks">
      <div class="spinner"></div>
      Ładowanie ebooków...
    </div>
    <div class="grid" id="ebooksGrid"></div>

    <h2 class="section-title" style="margin-top: 4rem;">Kursy Video</h2>
    <div class="loading active" id="loadingCourses">
      <div class="spinner"></div>
      Ładowanie kursów...
    </div>
    <div class="grid" id="coursesGrid"></div>

    <!-- ADMIN PROGRESS DASHBOARD -->
    <div id="adminProgressSection" style="display: none; margin-top: 4rem;">
      <h2 class="section-title">Progress Uczestników</h2>
      <div class="loading" id="loadingAdminProgress" style="display: none;">
        <div class="spinner"></div>
        Ładowanie danych...
      </div>
      <div style="background: var(--glass); backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden;">
        <table id="adminProgressTable" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: rgba(232,40,122,0.1);">
              <th style="padding: 1rem; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);">Uczestnik</th>
              <th style="padding: 1rem; text-align: center; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);">eBooki</th>
              <th style="padding: 1rem; text-align: center; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);">Kursy</th>
              <th style="padding: 1rem; text-align: center; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);">Razem</th>
              <th style="padding: 1rem; text-align: center; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7);">Postęp</th>
            </tr>
          </thead>
          <tbody id="adminProgressBody">
            <!-- Rows populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- UPLOAD EBOOK MODAL -->
  <div id="uploadEbookModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); backdrop-filter: blur(20px); z-index: 5000; padding: 2rem; overflow-y: auto; align-items: center; justify-content: center;">
    <div style="background: var(--glass); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 2.5rem; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3 style="font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .12em; background: linear-gradient(130deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Dodaj eBook</h3>
        <button onclick="closeUploadEbookModal()" style="background: transparent; border: none; font-size: 2rem; color: rgba(255,255,255,.5); cursor: pointer; line-height: 1;">×</button>
      </div>
      <form id="uploadEbookForm" onsubmit="handleEbookUpload(event)">
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Tytuł</label>
          <input type="text" id="ebookTitle" required style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;">
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Plik PDF</label>
          <label style="display: block; padding: 1.2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 2px dashed rgba(232,40,122,0.3); border-radius: 12px; text-align: center; cursor: pointer;">
            <input type="file" id="pdfFile" accept=".pdf" onchange="updatePdfName()" style="display: none;">
            <span style="color: rgba(255,255,255,.5); font-size: .85rem;">Kliknij aby wybrać PDF</span>
            <div id="pdfFileName" style="margin-top: .5rem; color: var(--pink); font-size: .8rem;"></div>
          </label>
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Okładka (PNG/JPG)</label>
          <label style="display: block; padding: 1.2rem; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 2px dashed rgba(232,40,122,0.3); border-radius: 12px; text-align: center; cursor: pointer;">
            <input type="file" id="coverFile" accept=".png,.jpg,.jpeg" onchange="updateCoverName()" style="display: none;">
            <span style="color: rgba(255,255,255,.5); font-size: .85rem;">Kliknij aby wybrać okładkę</span>
            <div id="coverFileName" style="margin-top: .5rem; color: var(--pink); font-size: .8rem;"></div>
          </label>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Dodaj eBook</button>
          <button type="button" class="btn btn-ghost" onclick="closeUploadEbookModal()">Anuluj</button>
        </div>
      </form>
    </div>
  </div>

  <!-- UPLOAD COURSE MODAL -->
  <div id="uploadCourseModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); backdrop-filter: blur(20px); z-index: 5000; padding: 2rem; overflow-y: auto; align-items: center; justify-content: center;">
    <div style="background: var(--glass); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 2.5rem; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3 style="font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .12em; background: linear-gradient(130deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Dodaj Kurs</h3>
        <button onclick="closeUploadCourseModal()" style="background: transparent; border: none; font-size: 2rem; color: rgba(255,255,255,.5); cursor: pointer; line-height: 1;">×</button>
      </div>
      <form id="uploadCourseForm" onsubmit="handleCourseUpload(event)">
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Tytuł</label>
          <input type="text" id="courseTitle" required style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;">
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Opis</label>
          <textarea id="courseDesc" rows="3" style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem; resize: vertical;"></textarea>
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">URL wideo</label>
          <input type="url" id="courseVideoUrl" required placeholder="https://youtube.com/watch?v=..." onchange="handleVideoUrlChange()" style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;">
          <div style="margin-top: .8rem;">
            <label style="display: flex; align-items: center; gap: .5rem; cursor: pointer;">
              <input type="checkbox" id="autoThumbnailCheck" checked onchange="handleVideoUrlChange()" style="width: 18px; height: 18px; cursor: pointer;">
              <span style="color: rgba(255,255,255,.6); font-size: .85rem;">Pobierz miniaturkę z wideo</span>
            </label>
          </div>
          <small style="color: rgba(255,255,255,.4); font-size: .75rem; display: block; margin-top: .5rem;">💡 Unlisted YouTube/Vimeo OK</small>
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Thumbnail URL (opcjonalne)</label>
          <input type="url" id="courseThumbnail" placeholder="Auto-generowane z wideo" style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;">
        </div>
        <div style="margin-bottom: 1.2rem;">
          <label style="display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .12em;">Czas trwania (opcjonalne)</label>
          <input type="text" id="courseDuration" placeholder="np. 45 min" style="width: 100%; padding: .9rem 1rem; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Dodaj Kurs</button>
          <button type="button" class="btn btn-ghost" onclick="closeUploadCourseModal()">Anuluj</button>
        </div>
      </form>
    </div>
  </div>

  <!-- VIDEO PLAYER MODAL -->
  <div id="videoModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); z-index: 6000; padding: 2rem; align-items: center; justify-content: center;" onclick="closeVideoModal()">
    <div style="position: relative; max-width: 1200px; width: 100%; background: var(--glass); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6);" onclick="event.stopPropagation()">
      <button onclick="closeVideoModal()" style="position: absolute; top: 1rem; right: 1rem; z-index: 10; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">×</button>
      <div id="videoContainer" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
        <!-- Video iframe will be injected here -->
      </div>
      <div style="padding: 1.5rem; background: rgba(0,0,0,0.3);">
        <h3 id="videoTitle" style="font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; margin: 0; background: linear-gradient(130deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></h3>
      </div>
    </div>
  </div>

  <!-- GLASS TOAST -->
  <div id="glassToast" style="display: none; position: fixed; bottom: 2rem; right: 2rem; z-index: 6000; opacity: 0; transform: translateY(20px); transition: all 0.3s ease-out;">
    <div style="background: var(--glass); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 1.2rem 1.5rem; box-shadow: 0 12px 40px rgba(0,0,0,0.4); min-width: 300px; display: flex; align-items: center; gap: 1rem;">
      <div id="toastIcon" style="font-size: 1.5rem; line-height: 1;"></div>
      <div id="toastMessage" style="flex: 1; color: rgba(255,255,255,0.9); font-size: .9rem;"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://empirebackend-production.up.railway.app';
    let currentUser = null;
    let userProgress = []; // Store user's progress data

    console.log('[INIT] Starting dashboard...');
    console.log('[INIT] API_URL:', API_URL);

    // Load user progress from API
    async function loadProgress() {
      console.log('[PROGRESS] Loading user progress...');
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/api/progress`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to load progress');

        userProgress = await res.json();
        console.log('[PROGRESS] Loaded:', userProgress.length, 'items');
        
        updateProgressBar();
      } catch (error) {
        console.error('[PROGRESS] Error loading progress:', error);
      }
    }

    // Check if material is completed
    function isCompleted(type, id) {
      return userProgress.some(p => 
        p.material_Type === type && 
        p.material_Id === id && 
        p.completed
      );
    }

    // Toggle material completion
    async function toggleCompletion(type, id) {
      console.log(`[PROGRESS] Toggling ${type} ${id}`);
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/api/progress/${type}/${id}`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to toggle completion');

        const data = await res.json();
        console.log('[PROGRESS]', data.message);
        
        // Reload progress to update UI
        await loadProgress();
        loadEbooks(); // Refresh to show updated checkboxes
        loadCourses();
      } catch (error) {
        console.error('[PROGRESS] Error:', error);
        alert('Błąd podczas aktualizacji postępu');
      }
    }

    // Update progress bar (tower visualization)
    function updateProgressBar() {
      // Calculate total from global variables set by loadEbooks/loadCourses
      // Use window variables to access from this scope
      const totalEbooks = window.totalEbooksCount || 0;
      const totalCourses = window.totalCoursesCount || 0;
      const totalMaterials = totalEbooks + totalCourses;
      
      if (totalMaterials === 0) {
        console.log('[PROGRESS] No materials yet, skipping update');
        return;
      }
      
      const completed = userProgress.filter(p => p.completed).length;
      const percentage = Math.round((completed / totalMaterials) * 100);
      
      console.log(`[PROGRESS] ${completed}/${totalMaterials} completed (${percentage}%) [ebooks: ${totalEbooks}, courses: ${totalCourses}]`);
      
      // Update tower segments opacity based on percentage
      // Each segment represents 20% (5 segments total)
      const segments = [
        { id: 'tower-base', threshold: 0 },    // Always visible at some level
        { id: 'tower-mid', threshold: 20 },
        { id: 'tower-upper', threshold: 40 },
        { id: 'tower-neck', threshold: 60 },
        { id: 'tower-spire', threshold: 80 }
      ];
      
      segments.forEach(seg => {
        const el = document.getElementById(seg.id);
        if (!el) return;
        
        if (percentage >= seg.threshold) {
          // Gradual opacity from threshold to threshold+20
          const opacity = percentage >= seg.threshold + 20 
            ? 1 
            : 0.1 + ((percentage - seg.threshold) / 20) * 0.9;
          el.style.opacity = opacity;
        } else {
          el.style.opacity = 0.1; // Barely visible
        }
      });
      
      // Update percentage text
      const progressText = document.getElementById('progress-percentage');
      if (progressText) {
        progressText.textContent = `${percentage}%`;
      }
    }

    function handleVideoUrlChange() {
      const videoUrl = document.getElementById('courseVideoUrl').value;
      const autoCheck = document.getElementById('autoThumbnailCheck').checked;
      const thumbnailInput = document.getElementById('courseThumbnail');

      if (!autoCheck || !videoUrl) {
        return;
      }

      console.log('[AUTO-THUMB] Generating thumbnail for:', videoUrl);

      // YouTube regex
      const youtubeMatch = videoUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
      if (youtubeMatch) {
        const videoId = youtubeMatch[1];
        const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
        thumbnailInput.value = thumbnailUrl;
        console.log('[AUTO-THUMB] YouTube thumbnail generated:', thumbnailUrl);
        return;
      }

      // Vimeo regex
      const vimeoMatch = videoUrl.match(/vimeo\.com\/(\d+)/);
      if (vimeoMatch) {
        const videoId = vimeoMatch[1];
        // Vimeo thumbnail service (vumbnail.com provides Vimeo thumbnails without API)
        const thumbnailUrl = `https://vumbnail.com/${videoId}.jpg`;
        thumbnailInput.value = thumbnailUrl;
        console.log('[AUTO-THUMB] Vimeo thumbnail generated:', thumbnailUrl);
        return;
      }

      console.log('[AUTO-THUMB] No video ID found');
    }

    async function handleEbookUpload(e) {

          const error = await res.json();
          throw new Error(error.error || 'Upload failed');

    function showGlassToast(message, type = 'success') {
      const toast = document.getElementById('glassToast');
      const icon = document.getElementById('toastIcon');
      const msg = document.getElementById('toastMessage');

      // Set icon based on type
      if (type === 'success') {
        icon.textContent = '✓';
        icon.style.color = '#10b981';
      } else {
        icon.textContent = '✗';
        icon.style.color = '#ef4444';
      }

      msg.textContent = message;
      toast.style.display = 'block';

      // Fade in
      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
      }, 10);

      // Auto-hide after 3s
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 300);
      }, 3000);
    }

      let embedUrl = '';
      
      // YouTube
      const youtubeMatch = videoUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
      if (youtubeMatch) {
        embedUrl = `https://www.youtube.com/embed/${youtubeMatch[1]}?autoplay=1&rel=0`;
      }
      
      // Vimeo
      const vimeoMatch = videoUrl.match(/vimeo\.com\/(\d+)/);
      if (vimeoMatch) {
        embedUrl = `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1`;
      }
      
      // Fallback - direct link
      if (!embedUrl) {
        embedUrl = videoUrl;
      }
      
      container.innerHTML = `<iframe src="${embedUrl}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      titleEl.textContent = title;
      
      modal.style.display = 'flex';
      
      // ESC to close
      document.addEventListener('keydown', handleVideoEsc);
    }

    function closeVideoModal() {
      console.log('[VIDEO] Closing video modal');
      const modal = document.getElementById('videoModal');
      const container = document.getElementById('videoContainer');
      
      modal.style.display = 'none';
      container.innerHTML = ''; // Stop video playback
      
      document.removeEventListener('keydown', handleVideoEsc);
    }

    function handleVideoEsc(e) {
      if (e.key === 'Escape') {
        closeVideoModal();
      }
    }

    function logout() {
      console.log('[LOGOUT] Logging out...');
      localStorage.removeItem('token');
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
