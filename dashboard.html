<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Marketingowe Imperium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: #1a1a2e; 
      color: #fff;
      padding: 2rem;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      background: #16213e;
      margin-bottom: 2rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    .btn:hover { background: #c23654; }
    .hero { text-align: center; margin-bottom: 3rem; }
    .hero h1 { font-size: 2rem; margin-bottom: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #16213e;
      padding: 1rem;
      border-radius: 8px;
    }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 2rem; }
    .spinner {
      border: 3px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav class="nav">
    <div>Dashboard</div>
    <div>
      <span id="userName"></span>
      <button class="btn" onclick="logout()">Wyloguj</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Witaj, <span id="heroName"></span>!</h1>
  </div>

  <h2>eBooki</h2>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Ładowanie...
  </div>
  <div class="grid" id="ebooksGrid"></div>

  <h2 style="margin-top: 3rem;">Kursy</h2>
  <div class="loading" id="coursesLoading">
    <div class="spinner"></div>
    Ładowanie...
  </div>
  <div class="grid" id="coursesGrid"></div>

  <script>
    const API_URL = 'https://empirebackend-production.up.railway.app';
    let currentUser = null;

    window.addEventListener('DOMContentLoaded', async () => {
      console.log('DOM loaded, API_URL:', API_URL);
      
      const token = localStorage.getItem('token');
      console.log('Token:', token ? 'exists' : 'missing');
      
      if (!token) {
        window.location.href = './index.html';
        return;
      }

      try {
        console.log('Fetching verify...');
        const res = await fetch(`${API_URL}/api/verify`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('Verify response:', res.status);

        if (!res.ok) throw new Error('Auth failed');

        const data = await res.json();
        currentUser = data.user;

        console.log('User:', currentUser);

        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('heroName').textContent = currentUser.name.split(' ')[0];

        loadEbooks();
        loadCourses();
      } catch (error) {
        console.error('Auth error:', error);
        alert('Błąd autoryzacji: ' + error.message);
        logout();
      }
    });

    async function loadEbooks() {
      console.log('Loading ebooks...');
      const grid = document.getElementById('ebooksGrid');
      const loading = document.getElementById('loading');
      
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/api/ebooks`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('Ebooks response:', res.status);

        if (!res.ok) throw new Error('Failed');

        const ebooks = await res.json();
        console.log('Ebooks:', ebooks.length);
        
        loading.style.display = 'none';

        if (ebooks.length === 0) {
          grid.innerHTML = '<p>Brak ebooków</p>';
        } else {
          grid.innerHTML = ebooks.map(e => `
            <div class="card">
              <img src="${API_URL}/uploads/ebooks/${e.coverPath}" alt="${e.title}">
              <h3>${e.title}</h3>
              <button class="btn">Pobierz</button>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Load ebooks error:', error);
        loading.innerHTML = '<p>Błąd: ' + error.message + '</p>';
      }
    }

    async function loadCourses() {
      console.log('Loading courses...');
      const grid = document.getElementById('coursesGrid');
      const loading = document.getElementById('coursesLoading');
      
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/api/courses`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('Courses response:', res.status);

        if (!res.ok) throw new Error('Failed');

        const courses = await res.json();
        console.log('Courses:', courses.length);
        
        loading.style.display = 'none';

        if (courses.length === 0) {
          grid.innerHTML = '<p>Brak kursów</p>';
        } else {
          grid.innerHTML = courses.map(c => `
            <div class="card">
              <img src="${c.thumbnailUrl || ''}" alt="${c.title}">
              <h3>${c.title}</h3>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Load courses error:', error);
        loading.innerHTML = '<p>Błąd: ' + error.message + '</p>';
      }
    }

    function logout() {
      console.log('Logging out...');
      localStorage.removeItem('token');
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
