<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard DIAGNOSTIC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: #1a1a2e; 
      color: #fff;
      padding: 2rem;
    }
    .diagnostic {
      background: #16213e;
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 4px solid #e94560;
    }
    .success { border-color: #10b981; }
    .error { border-color: #ef4444; }
  </style>
</head>
<body>
  <h1>DIAGNOSTIC MODE</h1>
  <div id="diagnostics"></div>

  <script>
    const diag = document.getElementById('diagnostics');
    
    function log(msg, status = 'info') {
      const div = document.createElement('div');
      div.className = `diagnostic ${status}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      diag.appendChild(div);
      console.log(msg);
    }

    log('Starting diagnostic...', 'info');

    const API_URL = 'https://empirebackend-production.up.railway.app';
    log(`API_URL set to: ${API_URL}`, 'success');

    // Check localStorage
    const token = localStorage.getItem('token');
    if (!token) {
      log('ERROR: No token in localStorage', 'error');
      log('Redirecting to login...', 'info');
      setTimeout(() => window.location.href = './index.html', 3000);
    } else {
      log(`Token found: ${token.substring(0, 20)}...`, 'success');
    }

    // Test verify endpoint
    log('Testing /api/verify...', 'info');
    fetch(`${API_URL}/api/verify`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    .then(res => {
      log(`Verify response status: ${res.status}`, res.ok ? 'success' : 'error');
      return res.json();
    })
    .then(data => {
      log(`User data received: ${JSON.stringify(data)}`, 'success');
      log(`User name: ${data.user?.name}`, 'success');
      log(`User role: ${data.user?.role}`, 'success');
      
      // Test ebooks endpoint
      log('Testing /api/ebooks...', 'info');
      return fetch(`${API_URL}/api/ebooks`, {
        headers: { Authorization: `Bearer ${token}` }
      });
    })
    .then(res => {
      log(`Ebooks response status: ${res.status}`, res.ok ? 'success' : 'error');
      return res.json();
    })
    .then(data => {
      log(`Ebooks data: ${JSON.stringify(data)}`, 'success');
      
      // Test courses endpoint
      log('Testing /api/courses...', 'info');
      return fetch(`${API_URL}/api/courses`, {
        headers: { Authorization: `Bearer ${token}` }
      });
    })
    .then(res => {
      log(`Courses response status: ${res.status}`, res.ok ? 'success' : 'error');
      return res.json();
    })
    .then(data => {
      log(`Courses data: ${JSON.stringify(data)}`, 'success');
      log('ALL TESTS PASSED! ✅', 'success');
      log('Problem is in dashboard rendering logic, not API.', 'info');
    })
    .catch(error => {
      log(`FATAL ERROR: ${error.message}`, 'error');
      log(`Error stack: ${error.stack}`, 'error');
    });
  </script>
</body>
</html>
