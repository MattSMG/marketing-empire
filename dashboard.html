<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Marketingowe Imperium</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #e8287a;
      --purple: #8b2fc9;
      --dark:   #06060f;
      --glass:  rgba(13, 13, 26, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(13, 13, 26, 0.8);
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(232, 40, 122, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 47, 201, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .nav {
      background: rgba(13, 13, 26, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .12em;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(232, 40, 122, 0.3));
    }

    .btn {
      padding: .6rem 1.4rem;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
      letter-spacing: .04em;
    }

    .btn-primary {
      background: linear-gradient(130deg, var(--pink), var(--purple));
      color: #fff;
      box-shadow: 0 4px 20px rgba(232, 40, 122, 0.3);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn-small {
      padding: .4rem 1rem;
      font-size: .75rem;
    }

    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: .1em;
      margin-bottom: .8rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .12em;
      margin-bottom: 1.5rem;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.8rem;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: all .3s;
    }

    .card:hover {
      border-color: rgba(232, 40, 122, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
    }

    .card-info {
      padding: 1.2rem;
    }

    .card-title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: .8rem;
    }

    .upload-placeholder {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 2px dashed rgba(232, 40, 122, 0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1rem;
      cursor: pointer;
      transition: all .3s;
      min-height: 340px;
    }

    .upload-placeholder:hover {
      background: rgba(232, 40, 122, 0.08);
      border-color: var(--pink);
      box-shadow: 0 0 30px rgba(232, 40, 122, 0.2);
    }

    .upload-icon {
      font-size: 3.5rem;
      opacity: .4;
      background: linear-gradient(130deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .upload-text {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: rgba(255,255,255,.5);
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,.5);
    }

    .loading.active { display: block; }

    .spinner {
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--pink);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="logo">Marketingowe Imperium</div>
    <div>
      <span id="userName" style="margin-right: 1rem;"></span>
      <button class="btn btn-ghost btn-small" onclick="logout()">Wyloguj</button>
    </div>
  </nav>

  <section class="hero">
    <h1>Witaj, <span id="heroName"></span>!</h1>
  </section>

  <main class="container">
    <h2 class="section-title">Twoje eBooki</h2>
    <div class="loading active" id="loadingEbooks">
      <div class="spinner"></div>
      Ładowanie ebooków...
    </div>
    <div class="grid" id="ebooksGrid"></div>

    <h2 class="section-title" style="margin-top: 4rem;">Kursy Video</h2>
    <div class="loading active" id="loadingCourses">
      <div class="spinner"></div>
      Ładowanie kursów...
    </div>
    <div class="grid" id="coursesGrid"></div>
  </main>

  <script>
    const API_URL = 'https://empirebackend-production.up.railway.app';
    let currentUser = null;

    console.log('[INIT] Starting dashboard...');
    console.log('[INIT] API_URL:', API_URL);

    window.addEventListener('DOMContentLoaded', async () => {
      console.log('[DOM] DOMContentLoaded fired');
      
      const token = localStorage.getItem('token');
      console.log('[AUTH] Token exists:', !!token);
      
      if (!token) {
        console.log('[AUTH] No token, redirecting to login');
        window.location.href = './index.html';
        return;
      }

      try {
        console.log('[AUTH] Fetching /api/verify...');
        const res = await fetch(`${API_URL}/api/verify`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('[AUTH] Verify response:', res.status);

        if (!res.ok) throw new Error('Auth failed');

        const data = await res.json();
        currentUser = data.user;

        console.log('[AUTH] User authenticated:', currentUser);
        console.log('[AUTH] User role:', currentUser.role);

        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('heroName').textContent = currentUser.name.split(' ')[0];

        console.log('[RENDER] Calling loadEbooks()...');
        loadEbooks();
        
        console.log('[RENDER] Calling loadCourses()...');
        loadCourses();
      } catch (error) {
        console.error('[AUTH] Error:', error);
        logout();
      }
    });

    async function loadEbooks() {
      console.log('[EBOOKS] Starting loadEbooks()');
      const grid = document.getElementById('ebooksGrid');
      const loading = document.getElementById('loadingEbooks');
      
      try {
        const token = localStorage.getItem('token');
        console.log('[EBOOKS] Fetching /api/ebooks...');
        
        const res = await fetch(`${API_URL}/api/ebooks`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('[EBOOKS] Response:', res.status);

        if (!res.ok) throw new Error('Failed');

        const ebooks = await res.json();
        console.log('[EBOOKS] Data received:', ebooks.length, 'ebooks');
        
        loading.classList.remove('active');
        console.log('[EBOOKS] Spinner hidden');

        grid.innerHTML = '';
        console.log('[EBOOKS] Grid cleared');

        // Add upload placeholder for admin
        console.log('[EBOOKS] Checking admin status:', currentUser.role);
        if (currentUser && currentUser.role === 'admin') {
          console.log('[EBOOKS] User is admin - adding upload placeholder');
          const placeholder = document.createElement('div');
          placeholder.className = 'upload-placeholder';
          placeholder.onclick = () => alert('Upload modal - TODO');
          placeholder.innerHTML = `
            <div class="upload-icon">+</div>
            <div class="upload-text">Dodaj eBook</div>
          `;
          grid.appendChild(placeholder);
          console.log('[EBOOKS] Upload placeholder added to grid');
        } else {
          console.log('[EBOOKS] User is NOT admin, skipping placeholder');
        }

        // Render ebook cards
        ebooks.forEach((ebook, i) => {
          console.log(`[EBOOKS] Rendering ebook ${i}:`, ebook.title);
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${API_URL}/uploads/ebooks/${ebook.coverPath}" alt="${ebook.title}">
            <div class="card-info">
              <div class="card-title">${ebook.title}</div>
              <button class="btn btn-primary btn-small">Pobierz</button>
            </div>
          `;
          grid.appendChild(card);
        });

        if (ebooks.length === 0 && currentUser.role !== 'admin') {
          console.log('[EBOOKS] No ebooks and not admin - showing message');
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,.4); padding: 3rem;">Brak dostępnych ebooków</p>';
        }

        console.log('[EBOOKS] Rendering complete');
      } catch (error) {
        console.error('[EBOOKS] Error:', error);
        loading.innerHTML = '<p>Błąd: ' + error.message + '</p>';
      }
    }

    async function loadCourses() {
      console.log('[COURSES] Starting loadCourses()');
      const grid = document.getElementById('coursesGrid');
      const loading = document.getElementById('loadingCourses');
      
      try {
        const token = localStorage.getItem('token');
        console.log('[COURSES] Fetching /api/courses...');
        
        const res = await fetch(`${API_URL}/api/courses`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        console.log('[COURSES] Response:', res.status);

        if (!res.ok) throw new Error('Failed');

        const courses = await res.json();
        console.log('[COURSES] Data received:', courses.length, 'courses');
        
        loading.classList.remove('active');
        console.log('[COURSES] Spinner hidden');

        grid.innerHTML = '';
        console.log('[COURSES] Grid cleared');

        // Add upload placeholder for admin
        console.log('[COURSES] Checking admin status:', currentUser.role);
        if (currentUser && currentUser.role === 'admin') {
          console.log('[COURSES] User is admin - adding upload placeholder');
          const placeholder = document.createElement('div');
          placeholder.className = 'upload-placeholder';
          placeholder.onclick = () => alert('Upload course modal - TODO');
          placeholder.innerHTML = `
            <div class="upload-icon">+</div>
            <div class="upload-text">Dodaj kurs wideo</div>
          `;
          grid.appendChild(placeholder);
          console.log('[COURSES] Upload placeholder added to grid');
        } else {
          console.log('[COURSES] User is NOT admin, skipping placeholder');
        }

        // Render course cards
        courses.forEach((course, i) => {
          console.log(`[COURSES] Rendering course ${i}:`, course.title);
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${course.thumbnailUrl || ''}" alt="${course.title}">
            <div class="card-info">
              <div class="card-title">${course.title}</div>
            </div>
          `;
          grid.appendChild(card);
        });

        if (courses.length === 0 && currentUser.role !== 'admin') {
          console.log('[COURSES] No courses and not admin - showing message');
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,.4); padding: 3rem;">Brak dostępnych kursów</p>';
        }

        console.log('[COURSES] Rendering complete');
      } catch (error) {
        console.error('[COURSES] Error:', error);
        loading.innerHTML = '<p>Błąd: ' + error.message + '</p>';
      }
    }

    function logout() {
      console.log('[LOGOUT] Logging out...');
      localStorage.removeItem('token');
      window.location.href = './index.html';
    }
  </script>
</body>
</html>
